name: Deploy OnTurn to VPS

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Iniciando deployment de OnTurn..."
            
            # Crear directorio si no existe y clonar repositorio
            if [ ! -d "/var/www/onturn-app" ]; then
              echo "📁 Creando directorio del proyecto..."
              mkdir -p /var/www
              cd /var/www
              git clone https://github.com/createam-devops/onturn-app.git
              cd onturn-app
            else
              echo "📂 Directorio existe, actualizando código..."
              cd /var/www/onturn-app
              git fetch origin
              git reset --hard origin/${{ github.ref_name }}
            fi
            echo "✅ Código actualizado"
            
            # Crear/actualizar archivo .env
            cat > .env << 'EOF'
            # Supabase
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            
            # VAPID Keys
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            
            # PWA
            NEXT_PUBLIC_ENABLE_PWA=true
            NEXT_PUBLIC_SITE_URL=https://onturn.app
            
            # Production
            NODE_ENV=production
            PORT=3000
            EOF
            echo "✅ Variables de entorno configuradas"
            
            # Detener contenedores anteriores
            docker-compose down 2>/dev/null || true
            echo "✅ Contenedores anteriores detenidos"
            
            # Limpiar imágenes antiguas
            docker image prune -af --filter "until=24h" || true
            echo "✅ Imágenes antiguas eliminadas"
            
            # Construir y levantar contenedores
            docker-compose up -d --build
            echo "✅ Contenedores construidos e iniciados"
            
            # Esperar que la aplicación esté lista
            echo "⏳ Esperando que la aplicación esté lista..."
            sleep 20
            
            # Verificar que el contenedor está corriendo
            if [ "$(docker-compose ps -q onturn-app)" ]; then
              if [ "$(docker ps -q -f name=onturn-app)" ]; then
                echo "✅ Contenedor onturn-app está corriendo"
                docker-compose ps
              else
                echo "❌ Error: Contenedor no está corriendo"
                docker-compose logs --tail 50
                exit 1
              fi
            else
              echo "❌ Error: Contenedor no existe"
              docker-compose logs --tail 50
              exit 1
            fi
            
            echo ""
            echo "🎉 Deployment completado exitosamente!"

      - name: Health check
        run: |
          echo "⏳ Esperando que la app esté lista..."
          sleep 15
          
          echo "🔍 Verificando salud de la aplicación..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://onturn.app)
          
          if [ $response -eq 200 ]; then
            echo "✅ Aplicación respondiendo correctamente (HTTP $response)"
            echo "🌐 URL: https://onturn.app"
          else
            echo "⚠️ Aplicación respondió con código: HTTP $response"
            echo "ℹ️  La aplicación podría estar iniciando, verifica en el VPS"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "📋 Resumen del Deployment"
          echo "========================"
          echo "Estado: ${{ job.status }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
          echo "========================"
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment exitoso a https://onturn.app"
          else
            echo "❌ Deployment falló - revisar logs"
          fi
